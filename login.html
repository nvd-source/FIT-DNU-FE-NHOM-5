<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin - Cafe Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="text-dark">CAFE</span><span class="text-danger">PREMIUM</span>
            </a>
        </div>
    </nav>

    <main class="py-5" style="padding-top:100px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <h3 class="text-center mb-4 fw-bold">Đăng nhập Admin</h3>
                            <form id="adminLoginForm" novalidate>
                                <div class="mb-3">
                                    <label for="adminUser" class="form-label fw-bold">Tên đăng nhập</label>
                                    <input id="adminUser" class="form-control form-control-lg" required placeholder="Nhập tên đăng nhập">
                                    <div class="invalid-feedback">Vui lòng nhập tên đăng nhập</div>
                                </div>
                                <div class="mb-4">
                                    <label for="adminPass" class="form-label fw-bold">Mật khẩu</label>
                                    <input id="adminPass" type="password" class="form-control form-control-lg" required placeholder="Nhập mật khẩu">
                                    <div class="invalid-feedback">Vui lòng nhập mật khẩu</div>
                                </div>
                                <button type="submit" class="btn btn-danger w-100 btn-lg fw-bold">Đăng nhập</button>
                            </form>
                            <div class="alert alert-info mt-3 mb-0">
                                <small><strong>Demo:</strong> Tên: admin | Mật khẩu: admin010101</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập Admin - Cafe Premium</title>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top bg-white shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="index.html">
                <span class="text-dark">CAFE</span>
                <span class="text-danger">PREMIUM</span>
            </a>

        </div>
    </nav>

    <!-- Login -->
    <main class="py-5" style="padding-top: 120px;">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-5">

                    <div class="card shadow-sm border-0 rounded-4">

                        <div class="card-body p-4">

                            <h2 class="text-center mb-4 fw-bold">
                                Đăng nhập Admin
                            </h2>

                    <div class="card shadow-lg border-0">
                        <div class="card-body p-5">
                            <h3 class="text-center mb-4 fw-bold">Đăng nhập Admin</h3>
                            <form id="adminLoginForm" novalidate>

                                <!-- Username -->
                                <div class="mb-3">

                                    <label for="adminUser" class="form-label">
                                        Tên đăng nhập
                                    </label>

                                    <input
                                        type="text"
                                        id="adminUser"
                                        class="form-control"
                                        placeholder="Nhập tên đăng nhập"
                                        required
                                    >

                                    <label for="adminUser" class="form-label fw-bold">Tên đăng nhập</label>
                                    <input id="adminUser" class="form-control form-control-lg" required placeholder="Nhập tên đăng nhập">
                                    <div class="invalid-feedback">Vui lòng nhập tên đăng nhập</div>
                                </div>

                                <!-- Password -->
                                <div class="mb-4">

                                    <label for="adminPass" class="form-label">
                                        Mật khẩu
                                    </label>

                                    <input
                                        type="password"
                                        id="adminPass"
                                        class="form-control"
                                        placeholder="Nhập mật khẩu"
                                        required
                                    >

                                <div class="mb-4">
                                    <label for="adminPass" class="form-label fw-bold">Mật khẩu</label>
                                    <input id="adminPass" type="password" class="form-control form-control-lg" required placeholder="Nhập mật khẩu">
                                    <div class="invalid-feedback">Vui lòng nhập mật khẩu</div>
                                </div>

                                <!-- Button -->
                                <button
                                    type="submit"
                                    class="btn btn-danger w-100 py-2 fw-bold rounded-pill"
                                >
                                    Đăng nhập
                                </button>

                                <button type="submit" class="btn btn-danger w-100 btn-lg fw-bold">Đăng nhập</button>
                            </form>

                            <div class="alert alert-info mt-3 mb-0">
                                <small><strong>Demo:</strong> Tên: admin | Mật khẩu: admin010101</small>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login JS -->
    <script src="login.js"></script>

</body>
</html>

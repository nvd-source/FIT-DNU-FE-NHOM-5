<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin Cafebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <span class="text-dark">CAFE</span><span class="text-danger">PREMIUM</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-4">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="public.html">Trang khách</a></li>
                    <li class="nav-item"><a class="btn btn-primary text-white" href="login.html">Quản trị</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="text-center mb-3">Đăng nhập Admin</h2>
                            <p class="text-center text-muted mb-4">Nhập tên tài khoản và mật khẩu</p>
                            <form id="adminLoginForm">
                                <div class="mb-3">
                                    <label for="adminUsername" class="form-label">Tên</label>
                                    <input type="text" class="form-control" id="adminUsername" required placeholder="Nhập tên tài khoản">
                                </div>
                                <div class="mb-3">
                                    <label for="adminPassword" class="form-label">Mật khẩu</label>
                                    <input type="password" class="form-control" id="adminPassword" required placeholder="Nhập mật khẩu">
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
